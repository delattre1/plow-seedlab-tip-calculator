<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tip Calculator</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --accent: #38bdf8;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --field: #0f172a;
    --border: #334155;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: var(--card);
    border-radius: 18px;
    padding: 1.75rem;
    box-shadow: 0 20px 50px rgba(0,0,0,0.45);
  }
  h1 {
    margin: 0 0 1.25rem;
    font-size: 1.4rem;
    letter-spacing: -0.01em;
  }
  .field { margin-bottom: 1rem; }
  label {
    display: block;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }
  input {
    width: 100%;
    padding: 0.7rem 0.85rem;
    font-size: 1.05rem;
    color: var(--text);
    background: var(--field);
    border: 1px solid var(--border);
    border-radius: 10px;
    outline: none;
    transition: border-color 0.15s ease;
  }
  input:focus { border-color: var(--accent); }
  .results {
    margin-top: 1.5rem;
    border-top: 1px solid var(--border);
    padding-top: 1.25rem;
    display: grid;
    gap: 0.85rem;
  }
  .result {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .result .name { color: var(--muted); font-size: 0.95rem; }
  .result .val {
    font-size: 1.5rem;
    font-weight: 650;
    font-variant-numeric: tabular-nums;
  }
  .result.primary .val { color: var(--accent); font-size: 1.9rem; }
</style>
</head>
<body>
  <main class="card">
    <h1>Tip Calculator</h1>

    <div class="field">
      <label for="bill">Bill amount</label>
      <input id="bill" type="number" inputmode="decimal" min="0" step="0.01" placeholder="0.00">
    </div>

    <div class="field">
      <label for="tip-pct">Tip percent (%)</label>
      <input id="tip-pct" type="number" inputmode="decimal" min="0" step="1" value="20">
    </div>

    <div class="field">
      <label for="split">Split between (people)</label>
      <input id="split" type="number" inputmode="numeric" min="1" step="1" value="1">
    </div>

    <div class="results">
      <div class="result">
        <span class="name">Tip</span>
        <span class="val" id="out-tip" data-value="0.00">$0.00</span>
      </div>
      <div class="result">
        <span class="name">Total</span>
        <span class="val" id="out-total" data-value="0.00">$0.00</span>
      </div>
      <div class="result primary">
        <span class="name">Per person</span>
        <span class="val" id="out-per-person" data-value="0.00">$0.00</span>
      </div>
    </div>
  </main>

<script>
(function () {
  "use strict";

  var billEl  = document.getElementById("bill");
  var tipEl   = document.getElementById("tip-pct");
  var splitEl = document.getElementById("split");

  var outTip   = document.getElementById("out-tip");
  var outTotal = document.getElementById("out-total");
  var outPer   = document.getElementById("out-per-person");

  // Coerce a field to a non-negative number; bad/empty/negative -> 0.
  function coerceAmount(raw) {
    var n = parseFloat(raw);
    if (!isFinite(n) || n < 0) return 0;
    return n;
  }

  // Coerce split to an integer >= 1; bad/empty/<1 -> 1. Fractions floor (2.7 -> 2).
  function coerceSplit(raw) {
    var n = parseFloat(raw);
    if (!isFinite(n)) return 1;
    n = Math.floor(n);
    if (n < 1) return 1;
    return n;
  }

  // Round half-up to exactly two decimals, return a clean 2-decimal string.
  function fmt(x) {
    if (!isFinite(x)) x = 0;
    var scaled = x * 100;
    // Nudge for binary float error so values like 36.665 round up cleanly.
    var rounded = Math.round(scaled + 1e-9);
    return (rounded / 100).toFixed(2);
  }

  function setOut(el, value) {
    el.setAttribute("data-value", value);
    el.textContent = "$" + value;
  }

  function recompute() {
    var bill  = coerceAmount(billEl.value);
    var tipP  = coerceAmount(tipEl.value);
    var split = coerceSplit(splitEl.value);

    var tip        = bill * (tipP / 100);
    var total      = bill + tip;
    var perPerson  = total / split;

    setOut(outTip,   fmt(tip));
    setOut(outTotal, fmt(total));
    setOut(outPer,   fmt(perPerson));
  }

  billEl.addEventListener("input", recompute);
  tipEl.addEventListener("input", recompute);
  splitEl.addEventListener("input", recompute);

  // Correct before any typing.
  recompute();
})();
</script>
</body>
</html>
